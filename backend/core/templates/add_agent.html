{% extends "base.html" %}
{% block title %}Добавление агента{% endblock %}
{% block content %}
<h1 style="margin-bottom: 1.5rem;">Добавление нового агента</h1>
<div class="card">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="hostname">Хостнейм *</label>
            <input type="text" name="hostname" id="hostname" class="form-control" required placeholder="comp-01"
                   value="{{ request.POST.hostname|default:'' }}">
        </div>
        <div class="form-group">
            <label for="ip_address">IP-адрес (необязательно)</label>
            <input type="text" name="ip_address" id="ip_address" class="form-control" placeholder="192.168.1.10"
                   value="{{ request.POST.ip_address|default:'' }}">
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Создать агента</button>
        <a href="/machines/" class="btn btn-outline">Отмена</a>
    </form>
</div>
{% endblock %}
